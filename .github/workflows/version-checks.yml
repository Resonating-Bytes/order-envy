name: Version checks

on:
  pull_request:
    branches:
      - main

jobs:
  app-version:
    name: App version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify app version bump when mobile changes
        run: node scripts/check-app-version.js --base "origin/${{ github.base_ref }}" --head HEAD
