name: Tests

on:
  push:
    branches: [main]
    paths:
      - 'lib/**'
      - 'services/**'
      - 'routes/**'
      - 'models/**'
      - 'tests/**'
      - 'api/**'
      - 'app.js'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/**'
      - 'seedData.js'
      - '.github/workflows/test.yml'
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:6
        ports:
          - 27017:27017

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            backend:
              - 'lib/**'
              - 'services/**'
              - 'routes/**'
              - 'models/**'
              - 'tests/**'
              - 'api/**'
              - 'app.js'
              - 'package.json'
              - 'package-lock.json'
              - 'scripts/**'
              - 'seedData.js'
              - '.github/workflows/test.yml'

      - name: Setup Node.js
        if: steps.changes.outputs.backend == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: steps.changes.outputs.backend == 'true'
        run: npm ci

      - name: Run tests
        if: steps.changes.outputs.backend == 'true'
        run: npm test
        env:
          DATABASE_URL: mongodb://127.0.0.1:27017/orderenvy
          TEST_DATABASE_URL: mongodb://127.0.0.1:27017/orderenvy_test
          JWT_SECRET: test-jwt-secret-for-ci
          SESSION_SECRET: test-session-secret-for-ci

      - name: Skip (no backend changes)
        if: steps.changes.outputs.backend != 'true'
        run: echo "No backend changes detected; skipping API tests."
